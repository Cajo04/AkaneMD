<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Akane MD — Your Personal AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080b10;
  --surface:  #0e1420;
  --surface2: #141c2e;
  --border:   #1e2d47;
  --accent:   #00d4ff;
  --accent2:  #0088ff;
  --accent3:  #7b2fff;
  --text:     #e2eaf5;
  --muted:    #4a607a;
  --user-bg:  #0a1f38;
  --danger:   #ff4444;
  --success:  #00e676;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; overflow: hidden; }

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; top: -50%; left: -20%; width: 60%; height: 80%;
  background: radial-gradient(ellipse, rgba(0,136,255,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
  animation: drift 12s ease-in-out infinite alternate;
}
@keyframes drift { from { transform: translate(0,0); } to { transform: translate(5%,8%); } }

.app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100dvh; max-width: 900px; margin: 0 auto; }

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  background: rgba(8,11,16,0.88); backdrop-filter: blur(16px); flex-shrink: 0; gap: 10px;
}
.logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo-icon {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent2), var(--accent3));
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; box-shadow: 0 0 16px rgba(0,136,255,0.4);
}
.logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.02em; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.logo-sub { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

.header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

.modes { display: flex; gap: 4px; }
.mode-btn { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.08em; }
.mode-btn:hover { border-color: var(--accent); color: var(--accent); }
.mode-btn.active { background: rgba(0,212,255,0.12); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(0,212,255,0.15); }

/* header icon buttons */
.icon-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s; position: relative; }
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
.icon-btn.on { border-color: var(--success); color: var(--success); background: rgba(0,230,118,0.08); }
.icon-btn .tooltip { position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 0.55rem; padding: 3px 7px; border-radius: 5px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s; z-index: 10; }
.icon-btn:hover .tooltip { opacity: 1; }

/* ── MESSAGES ── */
.messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* welcome */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 18px; padding: 30px 20px; text-align: center; animation: fadeIn 0.6s ease; }
.welcome-icon { width: 72px; height: 72px; border-radius: 22px; background: linear-gradient(135deg, var(--accent2), var(--accent3)); display: flex; align-items: center; justify-content: center; font-size: 36px; box-shadow: 0 0 40px rgba(0,136,255,0.3); animation: pulse-glow 3s ease-in-out infinite; }
@keyframes pulse-glow { 0%,100% { box-shadow: 0 0 30px rgba(0,136,255,0.3); } 50% { box-shadow: 0 0 60px rgba(0,136,255,0.5), 0 0 80px rgba(123,47,255,0.2); } }
.welcome h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.9rem; background: linear-gradient(135deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.welcome p { color: var(--muted); font-size: 0.78rem; max-width: 340px; line-height: 1.6; }
.suggestions { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
.suggestion { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
.suggestion:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.05); transform: translateY(-1px); }

/* messages */
.msg { display: flex; gap: 10px; animation: slideUp 0.28s ease; max-width: 100%; }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { flex-direction: row-reverse; }
.msg-avatar { width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 2px; }
.msg.user .msg-avatar { background: linear-gradient(135deg, #1a3a5c, #0a2040); border: 1px solid var(--border); }
.msg.bot  .msg-avatar { background: linear-gradient(135deg, var(--accent2), var(--accent3)); box-shadow: 0 0 12px rgba(0,136,255,0.3); }
.msg-content { max-width: 76%; display: flex; flex-direction: column; gap: 3px; }
.msg.user .msg-content { align-items: flex-end; }
.bubble { padding: 11px 15px; border-radius: 15px; font-size: 0.81rem; line-height: 1.65; word-break: break-word; }
.msg.user .bubble { background: var(--user-bg); border: 1px solid #1a3a5c; border-bottom-right-radius: 4px; }
.msg.bot  .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.bubble pre { background: rgba(0,0,0,0.45); border: 1px solid var(--border); border-radius: 8px; padding: 11px; margin-top: 9px; overflow-x: auto; font-size: 0.76rem; line-height: 1.5; }
.bubble code { font-family: 'JetBrains Mono', monospace; background: rgba(0,212,255,0.08); padding: 1px 5px; border-radius: 4px; font-size: 0.84em; color: var(--accent); }
.bubble pre code { background: none; padding: 0; color: #a8d8a8; }
.bubble img.attached { max-width: 100%; border-radius: 10px; margin-top: 8px; border: 1px solid var(--border); }
.msg-meta { display: flex; align-items: center; gap: 7px; }
.msg.user .msg-meta { justify-content: flex-end; }
.msg-time { font-size: 0.57rem; color: var(--muted); }
.bubble-actions { display: flex; gap: 5px; opacity: 0; transition: opacity 0.2s; }
.msg:hover .bubble-actions { opacity: 1; }
.action-btn { padding: 2px 9px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 0.58rem; cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: all 0.2s; }
.action-btn:hover { border-color: var(--accent); color: var(--accent); }

/* typing */
.typing { display: flex; align-items: center; gap: 10px; animation: slideUp 0.28s ease; }
.typing-avatar { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg, var(--accent2), var(--accent3)); display: flex; align-items: center; justify-content: center; font-size: 13px; box-shadow: 0 0 12px rgba(0,136,255,0.3); flex-shrink: 0; }
.typing-dots { display: flex; gap: 5px; padding: 11px 15px; background: var(--surface); border: 1px solid var(--border); border-radius: 15px; border-bottom-left-radius: 4px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s ease-in-out infinite; opacity: 0.6; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-6px); opacity: 1; } }

/* ── INPUT AREA ── */
.input-area { padding: 12px 20px 14px; border-top: 1px solid var(--border); background: rgba(8,11,16,0.9); backdrop-filter: blur(16px); flex-shrink: 0; }

/* image preview strip */
#imagePreview { display: none; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
#imagePreview.show { display: flex; }
.img-preview-item { position: relative; }
.img-preview-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); display: block; }
.img-preview-item .remove-img { position: absolute; top: -5px; right: -5px; width: 16px; height: 16px; border-radius: 50%; background: var(--danger); border: none; color: #fff; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }

.input-row { display: flex; gap: 8px; align-items: flex-end; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 9px 10px; transition: border-color 0.2s; }
.input-row:focus-within { border-color: var(--accent2); box-shadow: 0 0 18px rgba(0,136,255,0.1); }
.input-tools { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.input-icon-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid transparent; background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s; }
.input-icon-btn:hover { border-color: var(--border); color: var(--accent); }
.input-icon-btn.recording { color: var(--danger); animation: pulse-red 1s ease-in-out infinite; }
@keyframes pulse-red { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

#userInput { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.81rem; line-height: 1.5; resize: none; max-height: 110px; overflow-y: auto; padding: 2px 0; }
#userInput::placeholder { color: var(--muted); }
#userInput::-webkit-scrollbar { width: 3px; }
#userInput::-webkit-scrollbar-thumb { background: var(--border); }

.send-btn { width: 34px; height: 34px; border-radius: 9px; border: none; background: linear-gradient(135deg, var(--accent2), var(--accent3)); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; box-shadow: 0 0 12px rgba(0,136,255,0.3); }
.send-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 0 20px rgba(0,136,255,0.5); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

.input-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; padding: 0 3px; }
.input-hint { font-size: 0.58rem; color: var(--muted); }
.footer-actions { display: flex; gap: 10px; align-items: center; }
.clear-btn { font-size: 0.58rem; color: var(--muted); background: none; border: none; cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: color 0.2s; }
.clear-btn:hover { color: var(--danger); }

/* voice status bar */
#voiceStatus { display: none; align-items: center; gap: 8px; padding: 6px 12px; background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.3); border-radius: 8px; margin-bottom: 8px; font-size: 0.65rem; color: #ff8888; }
#voiceStatus.show { display: flex; }
.voice-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); animation: pulse-red 0.8s ease-in-out infinite; }

/* toast */
#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 16px; border-radius: 20px; font-size: 0.68rem; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* hidden file input */
#fileInput { display: none; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 600px) {
  header { padding: 10px 12px; }
  .logo-text { font-size: 1rem; }
  .mode-btn { padding: 3px 7px; font-size: 0.55rem; }
  .messages { padding: 12px; gap: 10px; }
  .msg-content { max-width: 86%; }
  .bubble { font-size: 0.78rem; padding: 9px 12px; }
  .input-area { padding: 10px 12px 12px; }
  .welcome h1 { font-size: 1.4rem; }
  .welcome-icon { width: 58px; height: 58px; font-size: 28px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div>
        <div class="logo-text">Akane MD</div>
        <div class="logo-sub">Personal AI Assistant</div>
      </div>
    </div>
    <div class="header-right">
      <div class="modes">
        <button class="mode-btn active" data-mode="default">Default</button>
        <button class="mode-btn" data-mode="coder">Coder</button>
        <button class="mode-btn" data-mode="tutor">Tutor</button>
        <button class="mode-btn" data-mode="friend">Friend</button>
      </div>
      <button class="icon-btn" id="ttsToggle" title="Toggle voice output" onclick="toggleTTS()">
        🔊<span class="tooltip">Voice output</span>
      </button>
    </div>
  </header>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h1>Hey, I'm Akane MD</h1>
      <p>Ask me anything — code, questions, or just chat. You can also send images or use your voice.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion('Help me write a Node.js API')">Help me write a Node.js API</button>
        <button class="suggestion" onclick="sendSuggestion('Explain async/await simply')">Explain async/await simply</button>
        <button class="suggestion" onclick="sendSuggestion('What can you do?')">What can you do?</button>
        <button class="suggestion" onclick="sendSuggestion('Debug my code')">Debug my code</button>
      </div>
    </div>
  </div>

  <!-- INPUT AREA -->
  <div class="input-area">
    <div id="voiceStatus"><div class="voice-dot"></div><span>Listening… speak now</span></div>
    <div id="imagePreview"></div>
    <div class="input-row">
      <div class="input-tools">
        <button class="input-icon-btn" id="micBtn" onclick="toggleVoiceInput()" title="Voice input">🎤</button>
        <button class="input-icon-btn" onclick="document.getElementById('fileInput').click()" title="Attach image">🖼️</button>
        <input type="file" id="fileInput" accept="image/*" multiple onchange="handleImageUpload(event)" />
      </div>
      <textarea id="userInput" placeholder="Message Akane MD..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter to send · Shift+Enter for new line</span>
      <div class="footer-actions">
        <button class="clear-btn" onclick="clearChat()">Clear chat</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STATE ──
let history      = [];
let currentMode  = "default";
let isLoading    = false;
let ttsEnabled   = false;
let isRecording  = false;
let recognition  = null;
let pendingImages = []; // [{base64, mimeType, dataUrl}]

const STORAGE_KEY = "akanemd_chat";

const messagesEl   = document.getElementById("messages");
const inputEl      = document.getElementById("userInput");
const sendBtn      = document.getElementById("sendBtn");
const micBtn       = document.getElementById("micBtn");
const ttsToggle    = document.getElementById("ttsToggle");
const voiceStatus  = document.getElementById("voiceStatus");
const imagePreview = document.getElementById("imagePreview");

// ── INIT ──
loadFromStorage();

inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + "px";
});
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.querySelectorAll(".mode-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentMode = btn.dataset.mode;
    saveToStorage();
  });
});

// ── LOCALSTORAGE ──
function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ history, mode: currentMode }));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.mode) {
      currentMode = data.mode;
      document.querySelectorAll(".mode-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.mode === currentMode);
      });
    }
    if (data.history && data.history.length > 0) {
      history = data.history;
      // remove welcome
      const w = document.getElementById("welcome");
      if (w) w.remove();
      // render messages
      history.forEach(m => renderMessage(m.role === "user" ? "user" : "bot", m.content, m.imageDataUrl || null, false));
    }
  } catch(e) {}
}

// ── HELPERS ──
function ts() { return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); }

function escapeHtml(t) { return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderMarkdown(text) {
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function toast(msg, duration = 2000) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), duration);
}

function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

// ── RENDER MESSAGE ──
function renderMessage(role, content, imageDataUrl = null, animate = true) {
  const w = document.getElementById("welcome");
  if (w) w.remove();

  const isUser = role === "user";
  const div = document.createElement("div");
  div.className = `msg ${isUser ? "user" : "bot"}`;
  if (!animate) div.style.animation = "none";

  const bodyHtml = isUser
    ? `${imageDataUrl ? `<img class="attached" src="${imageDataUrl}" alt="attached image"/>` : ""}${content ? `<div style="margin-top:${imageDataUrl?'6px':'0'}">${escapeHtml(content).replace(/\n/g,'<br>')}</div>` : ""}`
    : renderMarkdown(content);

  const actionsHtml = !isUser
    ? `<div class="bubble-actions">
        <button class="action-btn" onclick="copyText(this,${JSON.stringify(content)})">copy</button>
        <button class="action-btn" onclick="speakText(${JSON.stringify(content)})">speak</button>
       </div>`
    : "";

  div.innerHTML = `
    <div class="msg-avatar">${isUser ? "👤" : "🤖"}</div>
    <div class="msg-content">
      <div class="bubble">${bodyHtml}</div>
      <div class="msg-meta">
        <span class="msg-time">${ts()}</span>
        ${actionsHtml}
      </div>
    </div>`;

  messagesEl.appendChild(div);
  scrollBottom();
}

function addTyping() {
  const div = document.createElement("div");
  div.className = "typing"; div.id = "typing";
  div.innerHTML = `<div class="typing-avatar">🤖</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  messagesEl.appendChild(div);
  scrollBottom();
}
function removeTyping() { const t = document.getElementById("typing"); if(t) t.remove(); }

// ── SEND MESSAGE ──
async function sendMessage() {
  const text = inputEl.value.trim();
  const hasImages = pendingImages.length > 0;
  if ((!text && !hasImages) || isLoading) return;

  inputEl.value = "";
  inputEl.style.height = "auto";
  isLoading = true;
  sendBtn.disabled = true;

  const imgs = [...pendingImages];
  clearImagePreviews();

  // render user message
  const firstImg = imgs[0] || null;
  renderMessage("user", text, firstImg ? firstImg.dataUrl : null);

  addTyping();

  try {
    let reply;

    if (hasImages) {
      // vision call — send first image + prompt
      const img = imgs[0];
      const promptText = text || "Describe this image in detail.";
      const res = await fetch("/api/vision", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ imageBase64: img.base64, mimeType: img.mimeType, prompt: promptText, personality: currentMode })
      });
      const data = await res.json();
      reply = data.error ? "⚠️ " + data.error : data.reply;

      // add to text history so context continues
      history.push({ role: "user", content: promptText });
      history.push({ role: "assistant", content: reply });

    } else {
      // text chat
      history.push({ role: "user", content: text });
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history, personality: currentMode })
      });
      const data = await res.json();
      reply = data.error ? "⚠️ " + data.error : data.reply;
      if (!data.error) history.push({ role: "assistant", content: reply });
    }

    removeTyping();
    renderMessage("bot", reply);
    saveToStorage();

    if (ttsEnabled) speakText(reply);

  } catch(err) {
    removeTyping();
    renderMessage("bot", "⚠️ Connection error. Please try again.");
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function sendSuggestion(text) { inputEl.value = text; sendMessage(); }

// ── CLEAR ──
function clearChat() {
  history = [];
  saveToStorage();
  messagesEl.innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h1>Hey, I'm Akane MD</h1>
      <p>Ask me anything — code, questions, or just chat. You can also send images or use your voice.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion('Help me write a Node.js API')">Help me write a Node.js API</button>
        <button class="suggestion" onclick="sendSuggestion('Explain async/await simply')">Explain async/await simply</button>
        <button class="suggestion" onclick="sendSuggestion('What can you do?')">What can you do?</button>
        <button class="suggestion" onclick="sendSuggestion('Debug my code')">Debug my code</button>
      </div>
    </div>`;
}

// ── COPY ──
function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = "copied!";
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ── TTS (voice output) ──
function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  ttsToggle.classList.toggle("on", ttsEnabled);
  toast(ttsEnabled ? "🔊 Voice output ON" : "🔇 Voice output OFF");
}

function speakText(text) {
  if (!("speechSynthesis" in window)) { toast("TTS not supported in this browser"); return; }
  window.speechSynthesis.cancel();
  const stripped = text.replace(/```[\s\S]*?```/g,"[code block]").replace(/`[^`]+`/g,"").replace(/\*\*/g,"").replace(/\*/g,"");
  const utt = new SpeechSynthesisUtterance(stripped);
  utt.rate = 1.05; utt.pitch = 1;
  window.speechSynthesis.speak(utt);
}

// ── VOICE INPUT (STT) ──
function toggleVoiceInput() {
  if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
    toast("Voice input not supported in this browser");
    return;
  }
  if (isRecording) {
    stopVoiceInput();
  } else {
    startVoiceInput();
  }
}

function startVoiceInput() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add("recording");
    micBtn.textContent = "⏹️";
    voiceStatus.classList.add("show");
  };

  recognition.onresult = e => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join("");
    inputEl.value = transcript;
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + "px";
  };

  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove("recording");
    micBtn.textContent = "🎤";
    voiceStatus.classList.remove("show");
    recognition = null;
    // auto-send if there's text
    if (inputEl.value.trim()) sendMessage();
  };

  recognition.onerror = e => {
    toast("Voice error: " + e.error);
    stopVoiceInput();
  };

  recognition.start();
}

function stopVoiceInput() {
  if (recognition) { recognition.stop(); recognition = null; }
  isRecording = false;
  micBtn.classList.remove("recording");
  micBtn.textContent = "🎤";
  voiceStatus.classList.remove("show");
}

// ── IMAGE UPLOAD ──
function handleImageUpload(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    if (!file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const dataUrl = ev.target.result;
      const base64 = dataUrl.split(",")[1];
      const mimeType = file.type;
      pendingImages.push({ base64, mimeType, dataUrl });
      addImagePreview(dataUrl, pendingImages.length - 1);
    };
    reader.readAsDataURL(file);
  });
  e.target.value = "";
}

function addImagePreview(dataUrl, idx) {
  imagePreview.classList.add("show");
  const item = document.createElement("div");
  item.className = "img-preview-item";
  item.dataset.idx = idx;
  item.innerHTML = `<img src="${dataUrl}" alt="preview"/><button class="remove-img" onclick="removeImage(${idx})">✕</button>`;
  imagePreview.appendChild(item);
}

function removeImage(idx) {
  pendingImages.splice(idx, 1);
  refreshImagePreviews();
}

function refreshImagePreviews() {
  imagePreview.innerHTML = "";
  if (pendingImages.length === 0) { imagePreview.classList.remove("show"); return; }
  pendingImages.forEach((img, i) => addImagePreview(img.dataUrl, i));
}

function clearImagePreviews() {
  pendingImages = [];
  imagePreview.innerHTML = "";
  imagePreview.classList.remove("show");
}

// Paste image from clipboard
document.addEventListener("paste", e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith("image/")) {
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = ev => {
        const dataUrl = ev.target.result;
        const base64 = dataUrl.split(",")[1];
        pendingImages.push({ base64, mimeType: item.type, dataUrl });
        addImagePreview(dataUrl, pendingImages.length - 1);
        toast("📎 Image pasted!");
      };
      reader.readAsDataURL(file);
    }
  }
});

inputEl.focus();
</script>
